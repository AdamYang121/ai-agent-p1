# IMPORTANT: base64-encode your values before applying.
# Run: echo -n 'your-value' | base64
#
# Example:
#   echo -n 'sk-ant-...' | base64
#   echo -n 'my-gc-password' | base64

apiVersion: v1
kind: Secret
metadata:
  name: remodel-secrets
  namespace: default
type: Opaque
data:
  ANTHROPIC_API_KEY: <base64-encoded-key>
  GC_PASSWORD: <base64-encoded-password>
  SECRET_KEY: <base64-encoded-secret>
