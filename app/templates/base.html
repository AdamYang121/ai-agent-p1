<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Northwest Remodel Co.{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #f5f6fa; color: #2d3436; min-height: 100vh; }
    .navbar { background: #1B4F72; color: white; padding: 14px 24px;
              display: flex; align-items: center; justify-content: space-between; }
    .navbar h1 { font-size: 1.1rem; font-weight: 600; }
    .navbar a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; }
    .navbar a:hover { color: white; }
    .container { max-width: 960px; margin: 32px auto; padding: 0 20px; }
    .card { background: white; border-radius: 10px; padding: 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .card h2 { font-size: 1.2rem; color: #1B4F72; margin-bottom: 16px; }
    label { display: block; font-size: 0.85rem; font-weight: 500;
            color: #636e72; margin-bottom: 4px; margin-top: 14px; }
    input[type=text], input[type=email], input[type=tel], input[type=number],
    select, textarea {
      width: 100%; padding: 9px 12px; border: 1px solid #dfe6e9;
      border-radius: 6px; font-size: 0.95rem; transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #2E86C1;
    }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .checkbox-row input[type=checkbox] { width: 16px; height: 16px; }
    .checkbox-row label { margin: 0; color: #2d3436; }
    .btn { display: inline-block; padding: 10px 22px; border-radius: 6px;
           font-size: 0.95rem; font-weight: 500; cursor: pointer;
           border: none; transition: opacity .2s; }
    .btn-primary { background: #2E86C1; color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-danger  { background: #e74c3c; color: white; }
    .btn-outline { background: white; color: #2E86C1;
                   border: 1.5px solid #2E86C1; }
    .btn:hover { opacity: 0.88; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px;
             font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .badge-intake    { background: #dfe6e9; color: #636e72; }
    .badge-estimated { background: #ffeaa7; color: #856404; }
    .badge-sent      { background: #d1ecf1; color: #0c5460; }
    .badge-accepted  { background: #d4edda; color: #155724; }
    .badge-rejected  { background: #f8d7da; color: #721c24; }
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 0.9rem; }
    .alert-info { background: #d1ecf1; color: #0c5460; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: #1B4F72; color: white; padding: 10px 12px; text-align: left; }
    td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
    tr:hover td { background: #f8f9fa; }
    .text-right { text-align: right; }
    .text-muted { color: #636e72; font-size: 0.82rem; }
    .totals-row { font-weight: 700; font-size: 1.05rem; color: #1B4F72;
                  border-top: 2px solid #1B4F72 !important; }
    .section-divider { border: none; border-top: 1px solid #ecf0f1; margin: 20px 0; }
    #ai-answer { background: #eaf4fb; border-left: 3px solid #2E86C1;
                 padding: 12px 16px; border-radius: 4px; margin-top: 12px;
                 font-size: 0.9rem; line-height: 1.6; display: none; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar">
  <h1>Northwest Remodel Co. · Seattle, WA</h1>
  {% block nav_links %}{% endblock %}
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
